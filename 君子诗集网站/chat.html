<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>与君子对话 - 君子诗集</title>
<style>
  :root {
    --bg: #f8f5f0;
    --card: #fff;
    --text: #3a3a3a;
    --muted: #888;
    --accent: #8b4513;
    --accent-light: #d4a574;
    --border: #e8e0d5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Serif SC", "Songti SC", serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold;
  }
  .header-info { flex: 1; }
  .header-info h1 { font-size: 16px; margin-bottom: 2px; }
  .header-info p { font-size: 12px; color: var(--muted); }
  .back-btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 16px;
    font-size: 13px;
    cursor: pointer;
    color: var(--accent);
    text-decoration: none;
  }
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
  }
  .message.user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .message.bot {
    align-self: flex-start;
    background: var(--card);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .message .poem-quote {
    margin-top: 8px;
    padding: 8px 10px;
    background: #faf8f5;
    border-left: 3px solid var(--accent-light);
    border-radius: 0 6px 6px 0;
    font-style: italic;
    color: #555;
  }
  .message .poem-title {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
    font-style: normal;
  }
  .input-area {
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .input-area input:focus {
    border-color: var(--accent-light);
  }
  .input-area button {
    padding: 10px 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .input-area button:disabled {
    opacity: 0.5;
  }
  .quick-chips {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    overflow-x: auto;
    flex-shrink: 0;
    background: var(--card);
  }
  .quick-chips button {
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }
  .quick-chips button:hover {
    background: var(--accent-light);
    color: white;
    border-color: var(--accent-light);
  }
  .typing {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: typing 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  .loading-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }
  .loading-screen p {
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="avatar">君</div>
  <p>正在唤醒君子...<br><small>加载 697 首诗与思维框架</small></p>
</div>

<header>
  <div class="avatar">君</div>
  <div class="header-info">
    <h1>君子</h1>
    <p>退休矿工 · 诗人 · 基督徒 · 诗在，我就在</p>
  </div>
  <a href="index.html" class="back-btn">← 返回主页</a>
</header>

<div class="chat-container" id="chat"></div>

<div class="quick-chips" id="chips">
  <button onclick="sendQuick('你是谁')">你是谁</button>
  <button onclick="sendQuick('写一首关于母亲的诗')">关于母亲</button>
  <button onclick="sendQuick('什么是诗')">什么是诗</button>
  <button onclick="sendQuick('你的信仰')">你的信仰</button>
  <button onclick="sendQuick('红楼梦')">红楼梦</button>
  <button onclick="sendQuick('世界杯')">世界杯</button>
  <button onclick="sendQuick('云轩')">云轩</button>
  <button onclick="sendQuick('聊聊你的矿山生活')">矿山生活</button>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="与君子聊聊诗、生活、信仰..." onkeydown="if(event.key==='Enter')sendMessage()">
  <button onclick="sendMessage()" id="sendBtn">发送</button>
</div>

<script src="data.js"></script>
<script src="chat-logic.js"></script>
<script>
// 初始化
let isLoaded = false;
let isSending = false;

function init() {
  // 等待 data.js 加载
  if (typeof masterData === 'undefined') {
    setTimeout(init, 500);
    return;
  }
  isLoaded = true;
  document.getElementById('loading').style.display = 'none';
  
  // 欢迎消息
  addBotMessage(getWelcomeMessage());
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isSending) return;
  
  addUserMessage(text);
  input.value = '';
  
  showTyping();
  isSending = true;
  document.getElementById('sendBtn').disabled = true;
  
  getAIReply(text).then(reply => {
    hideTyping();
    // 简单转义HTML中的换行和markdown
    addBotMessage(reply);
    isSending = false;
    document.getElementById('sendBtn').disabled = false;
  }).catch(err => {
    hideTyping();
    addBotMessage(err || '哎呀，出了点问题，请稍后再试 😅');
    isSending = false;
    document.getElementById('sendBtn').disabled = false;
  });
}

function addUserMessage(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message user';
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addBotMessage(html) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message bot typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// 启动
init();
</script>

</body>
</html>
